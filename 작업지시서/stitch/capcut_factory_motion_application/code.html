<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CapCut Factory - Motion Application</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f1115",
                        "surface-dark": "#1a1d23",
                        "accent-cyan": "#00d1b2",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .grid-pattern {
            background-image: linear-gradient(#2a2d35 1px, transparent 1px), linear-gradient(90deg, #2a2d35 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="border-b border-slate-200 dark:border-slate-800 p-4 flex items-center justify-between bg-white dark:bg-surface-dark">
<div class="flex items-center gap-3">
<span class="material-icons-round text-primary text-3xl">movie_filter</span>
<h1 class="text-xl font-bold tracking-tight uppercase">CapCut Factory</h1>
</div>
<div class="flex gap-1 bg-slate-100 dark:bg-slate-800 p-1 rounded-lg">
<button class="px-6 py-2 rounded-md text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all">
                Image Matching
            </button>
<button class="px-6 py-2 rounded-md text-sm font-medium bg-white dark:bg-primary shadow-sm text-slate-900 dark:text-white transition-all">
                Motion Application
            </button>
</div>
</header>
<main class="flex-1 p-6 max-w-7xl mx-auto w-full grid grid-cols-12 gap-6 overflow-hidden">
<div class="col-span-12 lg:col-span-7 space-y-6 overflow-y-auto custom-scrollbar pr-2">
<div class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl p-8 flex flex-col items-center justify-center bg-white/50 dark:bg-white/5 hover:border-primary/50 transition-colors group cursor-pointer">
<div class="w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="material-icons-round text-slate-400 group-hover:text-primary">upload_file</span>
</div>
<p class="text-sm font-medium mb-1">DRAFT FILE</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Drop <code class="bg-slate-200 dark:bg-slate-700 px-1 rounded">draft_content.json</code> here or click to browse</p>
</div>
<div class="space-y-3">
<h3 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Zoom</h3>
<div class="grid grid-cols-4 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark hover:border-primary transition-all">
<span class="material-icons-round text-slate-400 mb-1">block</span>
<span class="text-xs font-bold">NONE</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-primary bg-primary/10 dark:bg-primary/20 transition-all ring-1 ring-primary ring-offset-2 ring-offset-background-light dark:ring-offset-background-dark">
<span class="material-icons-round text-primary mb-1">zoom_in</span>
<span class="text-xs font-bold text-primary">ZI (In)</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark hover:border-primary transition-all">
<span class="material-icons-round text-slate-400 mb-1">zoom_out</span>
<span class="text-xs font-bold">ZO (Out)</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark hover:border-primary transition-all">
<span class="material-icons-round text-slate-400 mb-1">shuffle</span>
<span class="text-xs font-bold">RD (Rand)</span>
</button>
</div>
</div>
<div class="space-y-4">
<h3 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Pan</h3>
<div class="flex items-center gap-4">
<span class="w-6 text-xs font-bold text-slate-400">H</span>
<div class="grid grid-cols-4 gap-3 flex-1">
<button class="p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark flex flex-col items-center">
<span class="text-[10px] font-bold">--</span>
<span class="text-[10px] text-slate-500 uppercase">None</span>
</button>
<button class="p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark flex flex-col items-center">
<span class="text-[10px] font-bold">-&gt;</span>
<span class="text-[10px] text-slate-500 uppercase">L &gt; R</span>
</button>
<button class="p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark flex flex-col items-center">
<span class="text-[10px] font-bold">&lt;-</span>
<span class="text-[10px] text-slate-500 uppercase">R &gt; L</span>
</button>
<button class="p-3 rounded-lg border-2 border-primary bg-primary/10 flex flex-col items-center">
<span class="text-[10px] font-bold text-primary">RD</span>
<span class="text-[10px] text-primary uppercase">Rand</span>
</button>
</div>
</div>
<div class="flex items-center gap-4">
<span class="w-6 text-xs font-bold text-slate-400">V</span>
<div class="grid grid-cols-4 gap-3 flex-1">
<button class="p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark flex flex-col items-center">
<span class="text-[10px] font-bold">--</span>
<span class="text-[10px] text-slate-500 uppercase">None</span>
</button>
<button class="p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark flex flex-col items-center">
<span class="text-[10px] font-bold">V</span>
<span class="text-[10px] text-slate-500 uppercase">T &gt; B</span>
</button>
<button class="p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark flex flex-col items-center">
<span class="text-[10px] font-bold">^</span>
<span class="text-[10px] text-slate-500 uppercase">B &gt; T</span>
</button>
<button class="p-3 rounded-lg border-2 border-primary bg-primary/10 flex flex-col items-center">
<span class="text-[10px] font-bold text-primary">RD</span>
<span class="text-[10px] text-primary uppercase">Rand</span>
</button>
</div>
</div>
</div>
<div class="space-y-3">
<h3 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Settings</h3>
<div class="bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-xl p-6 space-y-4">
<div class="flex items-center justify-between">
<label class="text-sm text-slate-600 dark:text-slate-400">Start Scale</label>
<input class="w-24 bg-slate-50 dark:bg-slate-800 border-none rounded-md text-sm text-right focus:ring-2 focus:ring-primary" step="0.01" type="number" value="1.04"/>
</div>
<div class="flex items-center justify-between">
<label class="text-sm text-slate-600 dark:text-slate-400">End Scale Range</label>
<div class="flex items-center gap-2">
<input class="w-20 bg-slate-50 dark:bg-slate-800 border-none rounded-md text-sm text-right focus:ring-2 focus:ring-primary" step="0.01" type="number" value="1.08"/>
<span class="text-slate-400">~</span>
<input class="w-20 bg-slate-50 dark:bg-slate-800 border-none rounded-md text-sm text-right focus:ring-2 focus:ring-primary" step="0.01" type="number" value="1.1"/>
</div>
</div>
<div class="flex items-center justify-between">
<label class="text-sm text-slate-600 dark:text-slate-400">Pan Strength</label>
<div class="flex items-center gap-2">
<input class="w-24 bg-slate-50 dark:bg-slate-800 border-none rounded-md text-sm text-right focus:ring-2 focus:ring-primary" step="0.01" type="number" value="0.05"/>
<span class="text-xs text-slate-400 uppercase">+/-</span>
</div>
</div>
</div>
</div>
</div>
<div class="col-span-12 lg:col-span-5 flex flex-col">
<h3 class="text-sm font-semibold uppercase tracking-wider text-slate-500 mb-3">Motion Preview</h3>
<div class="bg-black rounded-xl overflow-hidden flex-1 flex flex-col shadow-2xl border border-slate-800">
<div class="relative flex-1 grid-pattern flex items-center justify-center p-8">
<div class="aspect-video w-full border-2 border-dashed border-primary/50 relative flex items-center justify-center">
<div class="absolute inset-4 border-2 border-white opacity-90 shadow-[0_0_15px_rgba(255,255,255,0.3)]">
<div class="absolute top-2 left-2 text-[10px] text-white/50 font-mono">16:9</div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-full h-[1px] bg-white/20 border-t border-dashed border-white/20"></div>
<div class="h-full w-[1px] bg-white/20 border-l border-dashed border-white/20 absolute"></div>
</div>
</div>
</div>
</div>
<div class="bg-slate-900 p-6 font-mono text-xs">
<div class="flex justify-between text-slate-500 border-b border-slate-800 pb-2 mb-2">
<span>Zoom: Zoom In</span>
<span>Pan H: Random</span>
<span>V: Random</span>
</div>
<div class="grid grid-cols-3 gap-4">
<div class="space-y-1">
<div class="text-slate-500 uppercase tracking-tighter">Attribute</div>
<div class="text-primary">Scale</div>
<div class="text-primary">Pan X</div>
<div class="text-primary">Pan Y</div>
</div>
<div class="space-y-1">
<div class="text-slate-500 uppercase tracking-tighter">Start</div>
<div class="text-white">1.0400</div>
<div class="text-white">+0.0000</div>
<div class="text-white">+0.0000</div>
</div>
<div class="space-y-1">
<div class="text-slate-500 uppercase tracking-tighter">End</div>
<div class="text-accent-cyan">1.0937</div>
<div class="text-accent-cyan">-0.0058</div>
<div class="text-accent-cyan">-0.0046</div>
</div>
</div>
</div>
</div>
</div>
</main>
<footer class="p-6 bg-white dark:bg-surface-dark border-t border-slate-200 dark:border-slate-800 flex items-center justify-between">
<button class="px-4 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors text-sm font-semibold uppercase tracking-wide">
            New Project
        </button>
<button class="bg-primary hover:bg-blue-600 text-white px-12 py-3 rounded-lg font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2 group">
            APPLY MOTION
            <span class="material-icons-round text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</footer>

</body></html>
